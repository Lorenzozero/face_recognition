name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ------------------------------------------------------------------ #
  # Job 1: test veloci con mock (tutti i Python, nessun download modelli)
  # ------------------------------------------------------------------ #
  unit:
    name: Unit tests (mock) — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-unit-${{ matrix.python-version }}-${{ hashFiles('requirements_test.txt') }}
          restore-keys: ${{ runner.os }}-pip-unit-${{ matrix.python-version }}-

      - name: Install light dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt

      - name: Create insightface + maigret stubs
        run: |
          mkdir -p _stubs/insightface _stubs/maigret
          printf 'class FaceAnalysis:\n    def __init__(self,*a,**k): pass\n    def prepare(self,*a,**k): pass\n    def get(self,*a,**k): return []\n' > _stubs/insightface/__init__.py
          touch _stubs/maigret/__init__.py

      - name: Run unit tests
        run: pytest tests/ -v --tb=short -k "not integration"
        env:
          FR_API_TOKEN: test-token-ci
          # Disabilita rate limit nei test unit per evitare 429 flaky
          RATE_LIMIT_ENABLED: "false"
          PYTHONPATH: _stubs

  # ------------------------------------------------------------------ #
  # Job 2: test di integrazione REALE con InsightFace vero (solo Python 3.11)
  # ------------------------------------------------------------------ #
  integration:
    name: Integration tests (InsightFace real)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip (full deps)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-full-${{ hashFiles('requirements_ng.txt') }}
          restore-keys: ${{ runner.os }}-pip-full-

      - name: Cache InsightFace models (~300MB, scaricati una volta sola)
        uses: actions/cache@v4
        with:
          path: ~/.insightface
          key: insightface-models-buffalo_l-v1

      - name: Install full dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_ng.txt
          pip install pytest pytest-asyncio httpx

      - name: Pre-download InsightFace model (buffalo_l)
        run: |
          python - <<'EOF'
          from insightface.app import FaceAnalysis
          app = FaceAnalysis(name="buffalo_l", providers=["CPUExecutionProvider"])
          app.prepare(ctx_id=-1, det_size=(640, 640))
          print("Modello InsightFace pronto.")
          EOF

      - name: Run integration tests
        run: pytest tests/test_integration_real.py -v --tb=short
        env:
          FR_API_TOKEN: test-token-ci
          RATE_LIMIT_ENABLED: "false"
