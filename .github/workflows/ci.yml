name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ matrix.python-version }}-${{ hashFiles('requirements_test.txt') }}
          restore-keys: ${{ runner.os }}-pip-test-${{ matrix.python-version }}-

      - name: Install test dependencies (light - no insightface/onnxruntime)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt

      - name: Create insightface + maigret stubs
        run: |
          mkdir -p _stubs/insightface _stubs/maigret
          printf 'class FaceAnalysis:\n    def __init__(self,*a,**k): pass\n    def prepare(self,*a,**k): pass\n    def get(self,*a,**k): return []\n' > _stubs/insightface/__init__.py
          touch _stubs/maigret/__init__.py

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          FR_API_TOKEN: test-token-ci
          PYTHONPATH: _stubs
